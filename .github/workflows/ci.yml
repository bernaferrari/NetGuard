name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quietguard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Test and build Android and Wasm targets
        run: >-
          ./gradlew
          testDebugUnitTest lintDebug assembleDebug assembleRelease
          :webApp:wasmJsBrowserDistribution
          --no-daemon --parallel --build-cache --configuration-cache

      - name: Verify web distribution
        run: ./scripts/verify-web-deploy.sh --ci --web-only --skip-build
